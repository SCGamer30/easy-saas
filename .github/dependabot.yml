version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Bundle related packages together so PRs don't flood the queue
      react:
        patterns: ["react", "react-dom", "@types/react*"]
      nextjs:
        patterns: ["next", "@next/*"]
      clerk:
        patterns: ["@clerk/*"]
      convex:
        patterns: ["convex*"]
      sentry:
        patterns: ["@sentry/*"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "prettier-plugin-tailwindcss"]
      testing:
        patterns: ["vitest", "@vitejs/*", "@testing-library/*", "@playwright/*", "playwright*", "jsdom"]
      linting:
        patterns: ["eslint*", "prettier*", "husky", "lint-staged", "@commitlint/*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
