name: CI

on:
  pull_request:
    branches: [master, main]

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # convex/_generated is gitignored and only regenerated by `npx convex dev`,
      # which needs a deploy key. Stub it so tsc can resolve the imports.
      - run: ./scripts/ci-convex-stub.sh

      - run: npm run lint

      - run: npx tsc --noEmit
