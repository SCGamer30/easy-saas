name: CI

on:
  pull_request:
    branches: [master, main]

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # CLAUDE.md and AGENTS.md must stay byte-for-byte identical so every
      # coding agent (Claude Code, Codex, Cursor, Cline) reads the same
      # rules. Edit AGENTS.md, then `cp AGENTS.md CLAUDE.md` before
      # committing. The two files are duplicated rather than symlinked so
      # Windows users on a fresh clone get the real content.
      - name: Verify CLAUDE.md = AGENTS.md
        run: |
          if ! diff -q CLAUDE.md AGENTS.md > /dev/null; then
            echo "::error::CLAUDE.md and AGENTS.md have drifted. Run: cp AGENTS.md CLAUDE.md"
            diff CLAUDE.md AGENTS.md | head -40
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      # convex/_generated is gitignored and only regenerated by `npx convex dev`,
      # which needs a deploy key. Stub it so tsc can resolve the imports.
      - run: ./scripts/ci-convex-stub.sh

      - run: npm run lint

      - run: npx tsc --noEmit
